<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonbanh Header</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: Tahoma, Arial, sans-serif;
            background: #ffffff;
            color: #222;
        }
        
        #header {
            max-width: 1260px;
            margin: 0 auto;
            padding: 10px 12px 0;
            background: #ffffff;
        }
        
        .navbar-toggle {
            display: none;
        }
        
        #logo {
            display: inline-block;
            width: 230px;
            height: 48px;
            text-decoration: none;
            background: linear-gradient(90deg, #ffffff 0%, #f5f5f5 100%);
            border-radius: 3px;
            position: relative;
            vertical-align: middle;
        }
        
        #logo::before {
            content: "bonbanh.com";
            position: absolute;
            left: 10px;
            top: 12px;
            font-size: 28px;
            line-height: 1;
            font-weight: 700;
            color: #111;
            letter-spacing: -1px;
        }
        
        #logo::after {
            content: "drive your dreams";
            position: absolute;
            left: 168px;
            top: 20px;
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            font-style: italic;
            font-family: Georgia, "Times New Roman", serif;
        }
        
        #top-nav {
            float: right;
            margin-top: 2px;
            *width: 325px;
        }
        
        #top-nav ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0;
        }
        
        #top-nav li {
            border-right: 1px solid #aaa;
            padding: 0 16px;
            line-height: 1;
        }
        
        #top-nav li.ilast {
            border-right: none;
            padding-right: 0;
        }
        
        #top-nav a {
            font-size: 14px;
            color: #1935b5;
            text-decoration: none;
            white-space: nowrap;
        }
        
        #nav-bar {
            clear: both;
            margin-top: 14px;
            border: 1px solid #bcbcbc;
            background: #e5e5e5;
            display: flex;
            flex-wrap: wrap;
        }
        
        .menu-item {
            display: inline-block;
            padding: 8px 12px;
            text-decoration: none;
            color: #0038b2;
            font-size: 16px;
            font-weight: 700;
            border-right: 1px solid #bcbcbc;
            white-space: nowrap;
        }
        
        .menu-item:last-child {
            border-right: none;
        }
        
        .menu-item:hover {
            background: #f3f3f3;
        }
        
        .div_banner {
            min-width: 180px;
            min-height: 44px;
        }
        
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        
        @media (max-width: 1100px) {
            #logo {
                width: 200px;
                height: 44px;
            }
            #logo::before {
                font-size: 24px;
                top: 11px;
            }
            #logo::after {
                display: none;
            }
            #top-nav a {
                font-size: 13px;
            }
            .menu-item {
                font-size: 15px;
                padding: 7px 10px;
            }
        }
        
        @media (max-width: 768px) {
            #top-nav {
                float: none;
                margin-top: 8px;
            }
            #top-nav ul {
                justify-content: flex-start;
                flex-wrap: wrap;
            }
            #top-nav li {
                padding: 0 10px 8px 0;
                border: none;
            }
            #nav-bar {
                margin-top: 8px;
            }
            .menu-item {
                width: 100%;
                border-right: none;
                border-top: 1px solid #bcbcbc;
            }
            .menu-item:first-child {
                border-top: none;
            }
        }
    </style>
</head>

<body>
    <div id="header">
        <a class="navbar-toggle"> <span class="sr-only">Toggle navigation</span> <span class="icon-bar"></span> <span class="icon-bar"></span> <span class="icon-bar"></span></a>
        <a id="logo" href="https://bonbanh.com/" title="oto, mua ban oto"></a>
        <div id="top-nav" style="*width:325px">
            <ul>
                <li><a rel="nofollow" href="dang-ky-thanh-vien/">Đăng ký</a></li>
                <li><a rel="nofollow" href="thanh-vien/" onclick="open_dialog('login-dlg','username1');return false;">Đăng nhập</a></li>
                <li><a rel="nofollow" href="gioi-thieu/">Hướng dẫn</a></li>
                <li class="ilast"><a rel="nofollow" href="lien-he/">Liên hệ</a></li>
            </ul>
        </div>
        <div id="T_A" class="div_banner" style="float:right;margin:5px 2px 5px;clear: none;"></div>
        <div id="nav-bar"><a class="menu-item" href="https://bonbanh.com/" title="mua ban oto">Trang chủ</a><a class="menu-item" href="oto" title="mua ban oto cu, oto cu">Tìm mua ô tô</a><a class="menu-item" href="salon-oto" title="Salon oto / showroom oto">Salon Ôtô</a>
            <a
                class="menu-item" href="dang-tin-ban-xe" title="Bán ô tô">Bán ô tô</a><a class="menu-item" href="gia-xe-oto" title="Giá xe ô tô mới" itemprop="url"><span itemprop="name">Giá xe ô tô</span></a><a class="menu-item" href="tin-mua-xe" title="Các tin mua xe">Cần mua ?</a><a class="menu-item" href="my-bonbanh"
                    title="Quản lý tin đăng của bạn...">My BonBanh</a></div>
    </div>
</body>

</html>
